services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiobs
      POSTGRES_USER: aiobs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  api:
    image: aiobs-api:latest
    restart: unless-stopped
    environment:
      ConnectionStrings__AiObs: "Host=postgres;Port=5432;Database=aiobs;Username=aiobs;Password=${POSTGRES_PASSWORD}"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - postgres
    networks:
      - internal

  web:
    image: aiobs-web:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata: